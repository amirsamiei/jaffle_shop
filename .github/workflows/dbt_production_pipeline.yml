name: dbt_production_pipeline

# 1. This job should execute on a schedule, every day at 16:00 UTC
on:
  schedule:
    - cron: "00 16 * * *" # Executes automatically every day at 16:00 UTC
  # push:
  # branches:
  # - main # Also triggers an immediate production build if code changes are merged to main

env:
  DBT_PROFILES_DIR: . # to ensure dbt can find the profiles.yml file in the root of the repository

jobs:
  run_production_pipeline:
    runs-on: ubuntu-latest # Launches an isolated, temporary Linux server machine

    steps:
      # Step 1: Download the project code files from the Git repository
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step 2: Establish a stable Python environment on the runner
      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-node: "3.11"

      # Step 3: Install the bigquery warehouse execution adapter packages
      - name: Install dbt Dependencies
        run: |
          pip install dbt-bigquery

      # Step 4: Extract the encrypted JSON credentials out of the safe repository secret space
      # and drop it temporarily into the runner execution path root directory
      # Step 4: Extract credentials cleanly using an isolated environment block
      - name: Inject Warehouse Service Account Key
        env:
          RAW_JSON_KEY: ${{ secrets.GCP_SA_KEY }} # Safely binds the multi-line payload
        run: |
          echo "$RAW_JSON_KEY" > gcp-sa-key.json   # Writes the text with all internal quotes intact

      # Step 5: Execute the consolidated pipeline build sequence
      # Force target 'prod' so dbt bypasses dev sandboxes and updates production tables
      - name: Execute Production dbt Build Pass
        run: |
          dbt deps
          dbt build --target prod
